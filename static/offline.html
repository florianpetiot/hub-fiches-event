<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hors ligne</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          "Apple Color Emoji", "Segoe UI Emoji";
        background-color: #081028;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .card {
        width: 100%;
        max-width: 24rem;
        background: #0b1739;
        border-radius: 0.5rem;
        padding: 2rem;
        text-align: center;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      .icon-wrapper {
        width: 4rem;
        height: 4rem;
        margin: 0 auto;
        border-radius: 9999px;
        background: #3a4c7f;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-wrapper svg {
        width: 2.5rem;
        height: 2.5rem;
        color: #0b1739;
      }

      h1 {
        margin: 0;
        font-size: 1.25rem;
        line-height: 1.75rem;
        font-weight: 600;
      }

      p {
        margin: 0.5rem 0 0;
        color: #9ca3af;
        font-size: 0.875rem;
        line-height: 1.25rem;
      }

      button {
        width: 100%;
        margin-top: 1.5rem;
        border-radius: 0.5rem;
        border: 1px solid #3b82f6;
        background: transparent;
        color: #60a5fa;
        padding: 0.5rem 0.875rem;
        font-size: 0.875rem;
        line-height: 1.25rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      button:hover {
        background: #2563eb;
        color: #ffffff;
      }

      .content {
        margin-top: 1.5rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon-wrapper" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path d="M3.28 2.22a.75.75 0 0 0-1.06 1.06l2.889 2.89a9.5 9.5 0 0 0-1.77 1.393a10 10 0 0 0-1.104 1.338a.75.75 0 1 0 1.233.855A8.4 8.4 0 0 1 4.4 8.624a8 8 0 0 1 1.807-1.357l.965.966A6.4 6.4 0 0 0 5.48 9.45a6.4 6.4 0 0 0-1.192 1.644a.75.75 0 0 0 1.338.677q.353-.697.914-1.26c.52-.52 1.126-.9 1.773-1.14l1.281 1.282a4.1 4.1 0 0 0-2.48 1.186a4.1 4.1 0 0 0-.86 1.274a.75.75 0 1 0 1.374.6c.136-.31.32-.586.547-.813a2.63 2.63 0 0 1 3.376-.29l5.17 5.17a.75.75 0 1 0 1.06-1.061zm8.088 7.026a4.9 4.9 0 0 1 2.161 1.266c.359.358.676.803.918 1.275a.75.75 0 1 0 1.335-.683a6.6 6.6 0 0 0-1.192-1.653a6.43 6.43 0 0 0-4.896-1.878zM8.55 6.43a7.96 7.96 0 0 1 8.06 3.33a.75.75 0 1 0 1.235-.852A9.47 9.47 0 0 0 7.31 5.188zm2.371 9.21a1.242 1.242 0 1 0-1.757-1.757a1.242 1.242 0 0 0 1.757 1.757" />
        </svg>
      </div>
      <div class="content">
        <h1>Pas de connexion</h1>
        <p>Vérifiez votre connexion internet et réessayez.</p>
      </div>
      <button type="button" onclick="window.location.reload()">Réessayer</button>
    </main>
  </body>
</html>
